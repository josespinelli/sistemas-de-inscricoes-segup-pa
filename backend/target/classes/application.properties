# -------------------------------------------------------
# Servidor
# -------------------------------------------------------
server.port=${SERVER_PORT:8080}

# -------------------------------------------------------
# Banco de dados
# createDatabaseIfNotExist=true cria o schema automaticamente
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:segup_inscricoes}?useSSL=false&serverTimezone=America/Belem&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / Hibernate
# ddl-auto=none: o schema é gerenciado por schema.sql
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# -------------------------------------------------------
# Inicialização SQL (schema.sql + data.sql)
# -------------------------------------------------------
spring.sql.init.mode=always

# -------------------------------------------------------
# Swagger / OpenAPI
# -------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
